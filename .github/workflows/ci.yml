name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, build, a11y & Lighthouse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (includes static /work/:slug page generation)
        run: npm run build

      - name: Serve production build
        run: |
          npx vite preview --port 4173 --strictPort &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4173/ > /dev/null && break
            sleep 1
          done

      - name: Accessibility scan (axe-core)
        run: |
          npx axe http://localhost:4173/ --load-delay 2000 --exit
          npx axe http://localhost:4173/work/fraudshield/ --load-delay 2000 --exit

      - name: Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
